openapi: 3.0.3
info:
  title: Cohort ↔ FHIR Group Exchange (Da Vinci ATR alignment)
  version: 1.0.0
  description: |
    OpenAPI contract for representing quality-measurement **cohorts** as
    standards-based **FHIR `Group`** resources instead of a proprietary cohort
    payload, per issue #11.

    Cohort rosters are shaped to align with the **Da Vinci Member Attribution
    List (ATR) IG** `atr-group` profile and the DEQM `subject-list` / summary
    `subject` conventions (which reference a cohort `Group`). This lets
    providers, payers, and regulators consume the patient roster with existing
    DEQM + Da Vinci tooling rather than custom mappings.

    ## Endpoints (both submitters and receivers)

    - `GET  /api/workbench/cohorts/{cohortId}/Group` — export a cohort roster as
      an ATR-aligned FHIR `Group`.
    - `POST /api/workbench/cohorts/$import-group` — create/update a cohort from a
      FHIR `Group` (inverse of the export).

    ## Mapping: workbench cohort ⇄ FHIR Group

    | Cohort field   | FHIR Group location                                   |
    |----------------|-------------------------------------------------------|
    | `id`           | `Group.id` (prefixed `group-`)                        |
    | `name`         | `Group.name`                                          |
    | `memberIds[]`  | `Group.member[].entity` = `Reference(Patient/{id})`   |
    | `measureIds[]` | `Group.characteristic[].valueReference` → `Measure`   |
    | period         | `Group.member[].period` + a `characteristic.valuePeriod` |

    `Group.type = person`, `Group.actual = true`, `Group.quantity` = member count.
    Each `member` carries `inactive = false`. A membership `characteristic`
    (`v3-ObservationValue#COHORT`, `valueBoolean = true`) is always present so
    the ATR `characteristic 1..*` cardinality is satisfied.

    Full ATR conformance (coverage / attributed-provider slices, member
    change-type extensions, `managingEntity` sourcing) is **out of scope** for
    this iteration; see `_docs/DEQM_DAVINCI_ATR_GAP_ANALYSIS.md`.

servers:
  - url: http://127.0.0.1:8000
    description: Submitters backend (local dev)
  - url: http://127.0.0.1:8010
    description: Receivers backend (local dev)

paths:
  /api/workbench/cohorts/{cohortId}/Group:
    get:
      summary: Export a cohort roster as a Da Vinci ATR FHIR Group
      operationId: exportCohortGroup
      tags: [cohort-group]
      parameters:
        - $ref: '#/components/parameters/cohortId'
      responses:
        '200':
          description: The cohort roster as a FHIR Group resource.
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Group'
              examples:
                cms122Roster:
                  $ref: '#/components/examples/Cms122GroupRoster'
        '404':
          description: Cohort not found.
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'

  /api/workbench/cohorts/$import-group:
    post:
      summary: Create or update a cohort from a FHIR Group roster
      operationId: importCohortGroup
      tags: [cohort-group]
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/Group'
            examples:
              cms122Roster:
                $ref: '#/components/examples/Cms122GroupRoster'
      responses:
        '200':
          description: The cohort that was created or updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  cohort:
                    $ref: '#/components/schemas/WorkbenchCohort'
                  memberCount:
                    type: integer
                    example: 4
        '400':
          description: Body was not a FHIR Group resource.
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'

components:
  parameters:
    cohortId:
      name: cohortId
      in: path
      required: true
      schema:
        type: string
      example: cohort-cms122-diabetes

  schemas:
    Group:
      type: object
      description: |
        FHIR R4 Group aligned with the Da Vinci ATR `atr-group` profile.
      required: [resourceType, type, actual, member]
      properties:
        resourceType:
          type: string
          enum: [Group]
        id:
          type: string
          example: group-cohort-cms122-diabetes
        meta:
          type: object
          properties:
            profile:
              type: array
              items:
                type: string
              example:
                - http://hl7.org/fhir/us/davinci-atr/StructureDefinition/atr-group
        type:
          type: string
          enum: [person]
        actual:
          type: boolean
          example: true
        name:
          type: string
          example: CMS122 – Diabetes HbA1c Sample
        quantity:
          type: integer
          example: 4
        member:
          type: array
          items:
            type: object
            properties:
              entity:
                type: object
                properties:
                  reference:
                    type: string
                    example: Patient/p-cms122-001
              period:
                $ref: '#/components/schemas/Period'
              inactive:
                type: boolean
                example: false
        characteristic:
          type: array
          items:
            type: object
            properties:
              code:
                type: object
              valueBoolean:
                type: boolean
              valueReference:
                type: object
                properties:
                  reference:
                    type: string
              valuePeriod:
                $ref: '#/components/schemas/Period'
              exclude:
                type: boolean

    Period:
      type: object
      properties:
        start:
          type: string
          format: date
          example: '2026-01-01'
        end:
          type: string
          format: date
          example: '2026-12-31'

    WorkbenchCohort:
      type: object
      properties:
        id:
          type: string
          example: cohort-cms122-diabetes
        docType:
          type: string
          enum: [cohort]
        name:
          type: string
        description:
          type: string
        memberIds:
          type: array
          items:
            type: string
        measureIds:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        source:
          type: string
          example: fhir-group-import

    OperationOutcome:
      type: object
      properties:
        resourceType:
          type: string
          enum: [OperationOutcome]
        issue:
          type: array
          items:
            type: object
            properties:
              severity:
                type: string
              code:
                type: string
              diagnostics:
                type: string

  examples:
    Cms122GroupRoster:
      summary: A 4-patient diabetes cohort as an ATR Group
      value:
        resourceType: Group
        id: group-cohort-cms122-diabetes
        meta:
          profile:
            - http://hl7.org/fhir/us/davinci-atr/StructureDefinition/atr-group
        type: person
        actual: true
        name: CMS122 – Diabetes HbA1c Sample
        quantity: 4
        member:
          - entity:
              reference: Patient/p-cms122-x01
            inactive: false
            period:
              start: '2026-01-01'
              end: '2026-12-31'
          - entity:
              reference: Patient/p-cms122-001
            inactive: false
            period:
              start: '2026-01-01'
              end: '2026-12-31'
          - entity:
              reference: Patient/p-cms122-002
            inactive: false
            period:
              start: '2026-01-01'
              end: '2026-12-31'
          - entity:
              reference: Patient/p-cms122-003
            inactive: false
            period:
              start: '2026-01-01'
              end: '2026-12-31'
        characteristic:
          - code:
              coding:
                - system: http://terminology.hl7.org/CodeSystem/v3-ObservationValue
                  code: COHORT
              text: Quality measurement cohort membership
            valueBoolean: true
            exclude: false
          - code:
              text: Measurement / attribution period
            valuePeriod:
              start: '2026-01-01'
              end: '2026-12-31'
            exclude: false
          - code:
              text: In-scope quality measure
            valueReference:
              reference: https://accelerator.local/fhir/Measure/CMS122v11
            exclude: false
