# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

# Platform stack azd manifest.
#
# Provisions a dedicated resource group from platform/_infra/main.bicep.
# main.bicep names the RG "rg-${environmentName}", so an azd env named
# "dq-platform" lands in "rg-dq-platform".

name: dq-platform
metadata:
  template: dq-platform@1.0.0

infra:
  provider: bicep
  path: _infra
  module: main

services: {}

hooks:
  preprovision:
    windows:
      shell: pwsh
      run: ./_infra/hooks/preprovision.ps1
      continueOnError: false
      interactive: true

    posix:
      shell: sh
      run: ./_infra/hooks/preprovision.sh
      continueOnError: false
      interactive: true

  postprovision:
    windows:
      shell: pwsh
      run: ./_infra/hooks/postprovision.ps1
      continueOnError: false
      interactive: true

    posix:
      shell: sh
      run: ./_infra/hooks/postprovision.sh
      continueOnError: false
      interactive: true
