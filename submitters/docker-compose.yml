# Runs the submitters stack of the Azure Healthcare Digital Quality
# accelerator locally:
#   * orchestrator  - FastAPI quality-measure / MCP engine (internal port 8000)
#   * backend       - FastAPI API + DEQM router            (internal port 5000)
#   * frontend      - Nginx-served Vite/React UI           (internal port 80)
#
# The frontend's nginx.conf proxies /api/ and /fhir/ to the in-cluster DNS
# name `backend.dq.svc.cluster.local`, so the backend is given that name as
# a network alias - no template edits needed.
#
# From submitters/:
#   docker compose up --build
#
# Build contexts are set to `..` (the repo root) because the backend and
# orchestrator Dockerfiles COPY from `submitters/<svc>/...`, `data/`, and
# `measures/` paths that only resolve when the repo root is the context.

services:
  orchestrator:
    build:
      context: ..
      dockerfile: submitters/orchestrator/Dockerfile
    image: azure-healthcare-digital-quality-submitters-orchestrator:local
    env_file:
      - ./orchestrator/.env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8001:8000"
    networks:
      - dq-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ..
      dockerfile: submitters/backend/Dockerfile
    image: azure-healthcare-digital-quality-submitters-backend:local
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      # Point the backend at the orchestrator using its compose DNS name
      - DIGITAL_QUALITY_ORCHESTRATOR_BASE_URL=http://orchestrator:8000
      - DIGITAL_QUALITY_ORCHESTRATOR_AI_TIMEOUT_SECONDS=180
      # Local-only: allow anonymous calls so docker-compose smoke tests work
      - DEVELOPMENT_MODE=true
    ports:
      - "8000:5000"
    depends_on:
      orchestrator:
        condition: service_started
    networks:
      dq-net:
        # Alias so the frontend's production nginx.conf can resolve the
        # in-cluster DNS name without modification.
        aliases:
          - backend.dq.svc.cluster.local

  frontend:
    build:
      context: ./frontend
    image: azure-healthcare-digital-quality-submitters-frontend:local
    env_file:
      - ./frontend/.env
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - dq-net

networks:
  dq-net:
    driver: bridge
