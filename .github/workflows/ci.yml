name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  stacks:
    name: stack / ${{ matrix.stack }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: [consumers, providers, submitters, receivers, platform]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check stack root exists
        id: probe
        shell: bash
        run: |
          if [ -d "${{ matrix.stack }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install dependencies
        if: steps.probe.outputs.present == 'true' && hashFiles(format('{0}/requirements.txt', matrix.stack)) != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ matrix.stack }}/requirements.txt"
      - name: Run pytest (if tests exist)
        if: steps.probe.outputs.present == 'true' && hashFiles(format('tests/{0}/**/test_*.py', matrix.stack)) != ''
        run: |
          pip install pytest
          pytest "tests/${{ matrix.stack }}"
      - name: Stack scaffolding pending
        if: steps.probe.outputs.present != 'true'
        run: echo "stack ${{ matrix.stack }} not yet scaffolded -- Phase 0 placeholder."
